<svg xmlns="http://www.w3.org/2000/svg" width="220" height="56">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="220" height="56" rx="6" ry="6" fill="#000000"/>
  <rect x="2" y="2" width="216" height="52" rx="5" ry="5" fill="none" stroke="#00ffe0" stroke-width="2"/>
  <text
    x="110"
    y="33"
    font-family="'Press Start 2P', monospace"
    font-size="13"
    fill="#00ffe0"
    text-anchor="middle"
    filter="url(#glow)"
  >PLAY NOW</text>
</svg>
